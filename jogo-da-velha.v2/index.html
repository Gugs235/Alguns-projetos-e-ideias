<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo da Velha</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-blue-100 flex flex-col items-center min-h-screen p-4">
    <h1 class="text-3xl font-bold text-gray-800 mb-4">Jogo da Velha</h1>

    <div class="mb-4 text-lg">
        <span>Jogador Atual: </span><span id="currentPlayer">X</span>
    </div>

    <div class="mb-4 text-lg">
        Placar: X: <span id="scoreX">0</span> | O: <span id="scoreO">0</span>
    </div>

    <div id="board" class="grid grid-cols-3 gap-2 w-full max-w-xs">
        <div class="cell" data-index="0"></div>
        <div class="cell" data-index="1"></div>
        <div class="cell" data-index="2"></div>
        <div class="cell" data-index="3"></div>
        <div class="cell" data-index="4"></div>
        <div class="cell" data-index="5"></div>
        <div class="cell" data-index="6"></div>
        <div class="cell" data-index="7"></div>
        <div class="cell" data-index="8"></div>
    </div>
    
    <button id="resetButton" class="mt-6 bg-green-500 text-white px-6 py-2 rounded hover:bg-green-600">Reiniciar Jogo</button>
    <div id="gameMessage" class="mt-4 text-xl font-semibold text-gray-800"></div>
    <script src="game.js"></script>
    </body>
    </html>
