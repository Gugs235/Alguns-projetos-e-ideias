<!DOCTYPE html>
<html lang="pt-BR">
	<head>
		<meta charset="UTF-8" />
		<title>Para Você</title>
		<style>
			body {
				background-color: #1c1c2e;
				color: #f0e6f6;
				font-family: "Courier New", monospace;
				display: flex;
				flex-direction: column;
				justify-content: center;
				align-items: center;
				height: 100vh;
				text-align: center;
				padding: 2em;
			}
			h1 {
				color: #ff79c6;
			}
			p {
				font-size: 1.2em;
				max-width: 600px;
			}
		</style>
	</head>
	<body>
		<h1>Ei, moça...</h1>
		<p>
			Tem alguém que te observa de longe com carinho. Alguém que sorri só por ver
			você sorrindo. Que admira seu jeito calmo, seu foco, sua luz.
		</p>
		<p>
			Essa pessoa ainda não teve coragem de falar. Mas está mais perto do que você
			imagina.
		</p>
	</body>
</html>
