<!-- https://api.openweathermap.org/data/2.5/weather?q=Sao%20Paulo&appid={4c11524ee79d0d5d5d65e761163a2c32}&units=metric&lang=pt_br -->

<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Previsão do Tempo</title>
    <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/babel-standalone@7.22.5/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios@1.4.0/dist/axios.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div id="root"></div>
    <script type="text/babel">
        function App() {
            const [city, setCity] = React.useState('São Paulo');
            const [weather, setWeather] = React.useState(null);
            const [hourlyForecast, setHourlyForecast] = React.useState([]);
            const [dailyForecast, setDailyForecast] = React.useState([]);
            const [loading, setLoading] = React.useState(false);
            const [error, setError] = React.useState(null);

            const API_KEY = '4c11524ee79d0d5d5d65e761163a2c32' ; // Substitua pela sua chave da API OpenWeatherMap
            const API_BASE_URL = 'https://api.openweathermap.org/data/2.5';

            const fetchWeather = async (cityName) => {
                setLoading(true);
                setError(null);
                try {
                    // Fetch current weather
                    const currentResponse = await axios.get(`${API_BASE_URL}/weather`, {
                        params: { q: cityName, appid: API_KEY, units: 'metric', lang: 'pt_br' }
                    });
                    setWeather(currentResponse.data);

                    // Fetch forecast (hourly and daily)
                    const forecastResponse = await axios.get(`${API_BASE_URL}/forecast`, {
                        params: { q: cityName, appid: API_KEY, units: 'metric', lang: 'pt_br' }
                    });
                    setHourlyForecast(forecastResponse.data.list.slice(0, 8)); // Next 24 hours (8 * 3h)
                    setDailyForecast(forecastResponse.data.list.filter((_, index) => index % 8 === 0).slice(0, 5)); // 5 days
                } catch (err) {
                    setError('Cidade não encontrada ou erro na API.');
                }
                setLoading(false);
            };

            React.useEffect(() => {
                fetchWeather(city);
            }, [city]);

            const handleCityChange = (e) => {
                setCity(e.target.value);
            };

            const handleSearch = (e) => {
                e.preventDefault();
                if (city) fetchWeather(city);
            };

            const getWeatherIcon = (weatherCode) => {
                switch (weatherCode) {
                    case 'Clear': return 'fa-sun';
                    case 'Clouds': return 'fa-cloud';
                    case 'Rain': return 'fa-cloud-rain';
                    case 'Snow': return 'fa-snowflake';
                    default: return 'fa-cloud';
                }
            };

            const getRecommendations = (temp, weather) => {
                let clothing = '';
                let activity = '';
                if (temp < 15) {
                    clothing = '🧥 Use um casaco grosso e leve um agasalho extra para a noite.';
                    activity = '☕ Ideal para tomar um café quente ou curtir um cinema.';
                } else if (temp >= 15 && temp < 25) {
                    clothing = '👕 Uma blusa leve com casaco fino é suficiente.';
                    activity = '🌳 Ótimo dia para uma caminhada no parque.';
                } else {
                    clothing = '🌞 Use roupas leves e confortáveis.';
                    activity = '🏖 Aproveite para lavar roupas ou passear ao ar livre.';
                }
                if (weather === 'Rain') {
                    clothing += ' ☂️ Leve guarda-chuva ou capa de chuva.';
                    activity = '📚 Dia perfeito para ler um livro em casa.';
                }
                return { clothing, activity };
            };

            return (
                <div className="min-h-screen bg-gray-100 dark:bg-gray-800 text-gray-900 dark:text-white transition-colors">
                    {/* Navigation Bar */}
                    <nav className="bg-blue-600 p-4 shadow-md sticky top-0 z-10">
                        <div className="container mx-auto flex justify-between items-center">
                            <div className="text-white text-2xl font-bold">Previsão do Tempo</div>
                            <div className="flex items-center space-x-4">
                                <div className="relative">
                                    <input
                                        type="text"
                                        value={city}
                                        onChange={handleCityChange}
                                        placeholder="Digite uma cidade"
                                        className="p-2 rounded-lg text-gray-900"
                                    />
                                    <button
                                        onClick={handleSearch}
                                        className="ml-2 bg-yellow-500 text-white p-2 rounded-lg hover:bg-yellow-600"
                                    >
                                        Buscar
                                    </button>
                                </div>
                            </div>
                        </div>
                    </nav>

                    {/* Main Content */}
                    <div className="container mx-auto p-4">
                        {loading && <div className="text-center"><i className="fa fa-spinner fa-spin text-2xl"></i> Carregando...</div>}
                        {error && <div className="text-red-500 text-center">{error}</div>}
                        {weather && (
                            <div className="space-y-6">
                                {/* Current Weather */}
                                <div className="bg-white dark:bg-gray-700 p-6 rounded-lg shadow-md">
                                    <h2 className="text-2xl font-semibold">{weather.name}</h2>
                                    <div className="flex items-center space-x-4">
                                        <i className={`fa ${getWeatherIcon(weather.weather[0].main)} text-4xl`}></i>
                                        <div>
                                            <p className="text-3xl">{Math.round(weather.main.temp)}°C</p>
                                            <p>{weather.weather[0].description}</p>
                                            <p>Mín: {Math.round(weather.main.temp_min)}°C | Máx: {Math.round(weather.main.temp_max)}°C</p>
                                            <p>Chuva: {weather.clouds.all}%</p>
                                        </div>
                                    </div>
                                    <div className="mt-4">
                                        <h3 className="text-lg font-semibold">Recomendações</h3>
                                        <p>{getRecommendations(weather.main.temp, weather.weather[0].main).clothing}</p>
                                        <p>{getRecommendations(weather.main.temp, weather.weather[0].main).activity}</p>
                                    </div>
                                </div>

                                {/* Hourly Forecast */}
                                <div className="bg-white dark:bg-gray-700 p-6 rounded-lg shadow-md">
                                    <h3 className="text-lg font-semibold">Previsão Horária</h3>
                                    <div className="flex overflow-x-auto space-x-4 mt-2">
                                        {hourlyForecast.map((hour, index) => (
                                            <div key={index} className="flex-shrink-0 text-center">
                                                <p>{new Date(hour.dt * 1000).getHours()}:00</p>
                                                <i className={`fa ${getWeatherIcon(hour.weather[0].main)} text-2xl`}></i>
                                                <p>{Math.round(hour.main.temp)}°C</p>
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                {/* Daily Forecast */}
                                <div className="bg-white dark:bg-gray-700 p-6 rounded-lg shadow-md">
                                    <h3 className="text-lg font-semibold">Previsão para os Próximos Dias</h3>
                                    <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-5 gap-4 mt-2">
                                        {dailyForecast.map((day, index) => (
                                            <div key={index} className="text-center">
                                                <p>{new Date(day.dt * 1000).toLocaleDateString('pt-BR', { weekday: 'short' })}</p>
                                                <i className={`fa ${getWeatherIcon(day.weather[0].main)} text-2xl`}></i>
                                                <p>{Math.round(day.main.temp)}°C</p>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>

</html>
