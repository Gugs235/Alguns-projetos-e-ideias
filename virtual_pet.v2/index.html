<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Virtual Pet Game</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-blue-100 flex flex-col items-center min-h-screen p-4">
  <!-- Name Modal -->
  <div id="nameModal" class="modal">
    <div class="modal-content">
      <h2 class="text-xl font-bold mb-4">Name Your Pet!</h2>
      <input id="petNameInput" type="text" placeholder="Enter pet name" class="border p-2 mb-4 w-full rounded">
      <button onclick="startGame()" class="bg-green-500 text-white px-4 py-2 rounded hover:bg-green-600">Start</button>
    </div>
  </div>

  <!-- Main Game Interface -->
  <div id="gameContainer" class="hidden flex flex-col items-center w-full max-w-md">
    <h1 id="petName" class="text-2xl font-bold text-gray-800 mb-2"></h1>
    <div id="petSprite" class="my-4"></div>
    <div class="w-full mb-4">
      <div class="mb-2">Hunger: <div class="stat-bar"><div id="hungerFill" class="stat-fill bg-green-500" style="width: 100%"></div></div></div>
      <div class="mb-2">Happiness: <div class="stat-bar"><div id="happinessFill" class="stat-fill bg-blue-500" style="width: 100%"></div></div></div>
      <div class="mb-2">Cleanliness: <div class="stat-bar"><div id="cleanlinessFill" class="stat-fill bg-purple-500" style="width: 100%"></div></div></div>
      <div class="mb-2">Energy: <div class="stat-bar"><div id="energyFill" class="stat-fill bg-yellow-500" style="width: 100%"></div></div></div>
    </div>
    <div class="flex flex-wrap justify-center gap-2 mb-4">
      <button onclick="feed()" class="bg-green-500 text-white px-4 py-2 rounded hover:bg-green-600">Feed</button>
      <button onclick="startMiniGame()" class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">Play</button>
      <button onclick="clean()" class="bg-purple-500 text-white px-4 py-2 rounded hover:bg-purple-600">Clean</button>
      <button onclick="rest()" class="bg-yellow-500 text-white px-4 py-2 rounded hover:bg-yellow-600">Rest</button>
      <button onclick="openShop()" class="bg-pink-500 text-white px-4 py-2 rounded hover:bg-pink-600">Shop</button>
    </div>
    <div class="text-lg">Coins: <span id="coins">0</span> | Level: <span id="level">1</span></div>
    <canvas id="miniGameCanvas" width="300" height="200" class="mt-4"></canvas>
  </div>

  <!-- Shop Modal -->
  <div id="shopModal" class="modal">
    <div class="modal-content">
      <h2 class="text-xl font-bold mb-4">Shop</h2>
      <div id="shopItems" class="mb-4"></div>
      <button onclick="closeShop()" class="bg-gray-500 text-white px-4 py-2 rounded hover:bg-gray-600">Close</button>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
