```html
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyGrowth - Diário de Hábitos</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <nav>
            <h1>MyGrowth</h1>
            <div class="nav-tabs">
                <a href="#home" class="tab-link active" data-tab="home">Início</a>
                <a href="#habits" class="tab-link" data-tab="habits">Hábitos</a>
                <a href="#achievements" class="tab-link" data-tab="achievements">Conquistas</a>
            </div>
            <div>Pontos: <span id="points">0</span> | Nível: <span id="level">1</span></div>
        </nav>
    </header>

    <div class="container">
        <!-- Tela de Início -->
        <section id="home" class="tab-content active">
            <h2>Resumo Diário</h2>
            <div id="dailySummary" class="daily-summary"></div>
            <h2>Meus Hábitos</h2>
            <div id="habitsList"></div>
            <h2>Conquistas</h2>
            <div id="achievementsSummary" class="achievements-summary"></div>
            <div class="reset-section">
                <button id="resetButton">Reiniciar Tudo</button>
            </div>
        </section>

        <!-- Tela de Hábitos -->
        <section id="habits" class="tab-content">
            <h2>Adicionar Hábito</h2>
            <form id="habitForm" class="habit-form">
                <div class="form-group">
                    <label for="habitName">Nome do hábito</label>
                    <input type="text" id="habitName" placeholder="Ex.: Comer" maxlength="50" required>
                    <div id="nameError" class="error">O nome é obrigatório e deve ter até 50 caracteres.</div>
                </div>
                <div class="form-group">
                    <label for="habitFrequency">Frequência</label>
                    <select id="habitFrequency">
                        <option value="diario">Diário</option>
                        <option value="semanal">Semanal</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="dailyExecutions">Execuções por dia</label>
                    <input type="number" id="dailyExecutions" min="1" max="5" placeholder="Ex.: 3" required>
                    <div id="executionsError" class="error">Deve ser entre 1 e 5.</div>
                </div>
                <div class="form-group">
                    <label for="habitTimes">Horários (HH:MM, separados por vírgula)</label>
                    <input type="text" id="habitTimes" placeholder="Ex.: 8:00,12:00,20:00">
                    <div id="timesError" class="error">Use formato HH:MM, separado por vírgulas.</div>
                </div>
                <button type="submit">Adicionar Hábito</button>
            </form>
        </section>

        <!-- Tela de Conquistas -->
        <section id="achievements" class="tab-content">
            <h2>Minhas Conquistas</h2>
            <div id="achievementsList" class="achievements-grid"></div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
```
